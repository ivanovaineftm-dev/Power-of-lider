<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Обработка Excel</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Обработка Excel-файлов</h1>
    <p class="subtitle">Загрузите файлы, обработайте и скачайте результат.</p>

    <section id="slots" class="grid"></section>

    <section class="global-actions">
      <button id="process-all-btn">Обработать</button>
      <p id="process-status" class="status">Нет загруженных файлов для обработки</p>
      <ul id="download-list" class="download-list"></ul>
    </section>
  </main>

  <template id="slot-template">
    <article class="card">
      <h2 class="slot-title"></h2>
      <input type="file" class="file-input" accept=".xlsx,.xls" />
      <p class="status">Файл не выбран</p>
      <div class="actions">
        <button class="upload-btn">Загрузить</button>
        <button class="clear-btn secondary">Очистить</button>
      </div>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
